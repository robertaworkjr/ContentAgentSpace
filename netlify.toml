[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/agent"
  to = "/.netlify/functions/agent"
  status = 200

[[redirects]]
  from = "/api/agent"
  to = "/.netlify/functions/agent"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

