<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Demo Agent — contentagent.space</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --surface2:   #1a1a24;
      --border:     #2a2a3a;
      --accent:     #7c6ef0;
      --accent-dim: #4a3fa0;
      --accent-glow:rgba(124,110,240,0.18);
      --text:       #e8e6f0;
      --text-dim:   #8a88a0;
      --text-muted: #4a4860;
      --agent-bg:   #16162a;
      --user-bg:    #1e1e38;
      --success:    #4ade80;
      --font-head:  'Syne', sans-serif;
      --font-mono:  'DM Mono', monospace;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 24px 60px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,110,240,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(80,60,200,0.05) 0%, transparent 70%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    .header {
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--accent-glow);
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      border: 2px solid var(--surface);
    }

    .header-info { flex: 1; min-width: 0; }

    .agent-name {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .agent-meta {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-badge {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent-glow);
    }

    /* ── Messages ────────────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 380px;
      max-height: 480px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      margin-top: 2px;
    }

    .msg.agent .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .msg.user .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--accent-dim);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* ── Typing indicator ────────────────────────────────────────────────────── */
    .typing { display: none; }
    .typing.visible { display: flex; }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot 1.2s infinite;
      opacity: 0.4;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { opacity: 0.4; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Input area ──────────────────────────────────────────────────────────── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
    }

    .input-wrap { flex: 1; position: relative; }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.5;
      padding: 10px 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.04); }
    .send-btn:active:not(:disabled) { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Footer ──────────────────────────────────────────────────────────────── */
    .footer {
      padding: 10px 20px 14px;
      text-align: center;
      font-size: 10.5px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .footer a:hover { opacity: 1; }

    /* ── Error state ─────────────────────────────────────────────────────────── */
    .error-msg {
      font-size: 12px;
      color: #f87171;
      text-align: center;
      padding: 6px 0 0;
    }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 560px) {
      .shell { padding: 0; align-items: flex-end; }
      .card  { max-width: 100%; border-radius: var(--radius) var(--radius) 0 0; }
      .messages { max-height: calc(100svh - 220px); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card" id="chatCard">

      <!-- Header -->
      <div class="header">
        <div class="avatar">🤖</div>
        <div class="header-info">
          <div class="agent-name" id="agentNameDisplay">AI Agent</div>
          <div class="agent-meta" id="businessNameDisplay">Demo Agent</div>
        </div>
        <div class="header-badge">Live Demo</div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages">
        <!-- Typing indicator -->
        <div class="msg agent typing" id="typingIndicator">
          <div class="msg-avatar">🤖</div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="userInput"
            placeholder="Type your message…"
            rows="1"
            aria-label="Your message"
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <!-- Footer -->
      <div class="footer">
        Powered by <a href="https://contentagent.space" target="_blank" rel="noopener">contentagent.space</a>
        &nbsp;·&nbsp; AI agents for real businesses
      </div>

    </div>
  </div>

  <script>
    // ── Config ─────────────────────────────────────────────────────────────────
    // Change AGENT_ENDPOINT to your deployed Netlify URL in production
    const AGENT_ENDPOINT = window.AGENT_ENDPOINT || '/.netlify/functions/agent';
    const BUSINESS_NAME  = window.BUSINESS_NAME  || 'this business';
    const AGENT_NAME     = window.AGENT_NAME     || 'Alex';

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const messagesEl    = document.getElementById('messages');
    const userInput     = document.getElementById('userInput');
    const sendBtn       = document.getElementById('sendBtn');
    const typingEl      = document.getElementById('typingIndicator');
    const agentNameEl   = document.getElementById('agentNameDisplay');
    const businessEl    = document.getElementById('businessNameDisplay');

    // ── State ──────────────────────────────────────────────────────────────────
    let conversationHistory = [];
    let isLoading = false;

    // ── Init ───────────────────────────────────────────────────────────────────
    agentNameEl.textContent = AGENT_NAME;
    businessEl.textContent  = BUSINESS_NAME;
    sendBtn.disabled = false;

    // Greet on load
    const greeting = `Hi, thanks for reaching out to ${BUSINESS_NAME}. I'm ${AGENT_NAME} — how can I help you today?`;
    appendMessage('agent', greeting);
    conversationHistory.push({ role: 'assistant', content: greeting });

    // ── Auto-resize textarea ───────────────────────────────────────────────────
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // ── Enter to send (Shift+Enter for newline) ────────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isLoading) handleSend();
      }
    });

    sendBtn.addEventListener('click', () => { if (!isLoading) handleSend(); });

    // ── Core send flow ─────────────────────────────────────────────────────────
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = '';
      userInput.style.height = 'auto';
      setLoading(true);

      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      showTyping(true);

      try {
        const response = await fetch(AGENT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Agent offline');
        }

        const reply = data.reply || '';
        conversationHistory.push({ role: 'assistant', content: reply });
        appendMessage('agent', reply);

      } catch (err) {
        appendMessage('agent', `Sorry, I'm having a moment — please try again in a few seconds.`);
        // Remove the failed user message from history so flow stays clean
        conversationHistory.pop();
      } finally {
        showTyping(false);
        setLoading(false);
      }
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function appendMessage(role, text) {
      const isAgent = role === 'agent';

      const msgEl = document.createElement('div');
      msgEl.className = `msg ${isAgent ? 'agent' : 'user'}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = isAgent ? '🤖' : '👤';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msgEl.appendChild(avatar);
      msgEl.appendChild(bubble);

      // Insert before typing indicator
      messagesEl.insertBefore(msgEl, typingEl);
      scrollToBottom();
    }

    function showTyping(show) {
      typingEl.classList.toggle('visible', show);
      scrollToBottom();
    }

    function setLoading(state) {
      isLoading = state;
      sendBtn.disabled = state;
      userInput.disabled = state;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }
  </script>
</body>
</html>
