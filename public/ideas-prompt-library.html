<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE IDEA ENGINE — Creative Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060608;
    --deep: #0c0c12;
    --surface: #111118;
    --border: #1e1e2a;
    --text: #e8e4dc;
    --muted: #6a6880;
    --accent-a: #c8ff47;
    --accent-b: #ff4d6d;
    --accent-c: #00d4ff;
    --accent-d: #ff8c42;
    --accent-e: #b47cff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  /* Header */
  header {
    padding: 60px 60px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: 'PROMPTS';
    position: absolute;
    right: -20px;
    top: -20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    color: var(--border);
    letter-spacing: -10px;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 4px;
    line-height: 1;
    z-index: 1;
  }

  .logo span {
    color: var(--accent-a);
  }

  .header-meta {
    text-align: right;
    z-index: 1;
  }

  .header-meta p {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.8;
  }

  /* Filter bar */
  .filters {
    padding: 20px 60px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-right: 12px;
  }

  .tag-pill {
    padding: 4px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .tag-pill:hover, .tag-pill.active {
    color: var(--accent-a);
    border-color: var(--accent-a);
    background: rgba(200,255,71,0.05);
  }

  .tag-pill.all.active {
    color: var(--black);
    background: var(--accent-a);
    border-color: var(--accent-a);
  }

  /* Grid */
  .grid {
    padding: 40px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 2px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px 30px;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.25s ease;
  }

  .card:hover {
    border-color: var(--card-accent);
    transform: translateY(-2px);
    z-index: 2;
  }

  .card:hover::before {
    transform: scaleY(1);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 16px;
  }

  .card-category {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--card-accent);
    padding: 3px 8px;
    border: 1px solid var(--card-accent);
    border-radius: 1px;
    opacity: 0.85;
  }

  .card-index {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--border);
    letter-spacing: 1px;
    line-height: 1;
    transition: color 0.2s;
  }

  .card:hover .card-index {
    color: var(--muted);
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.1;
  }

  .card-prompt {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    font-weight: 300;
    color: rgba(232,228,220,0.75);
    line-height: 1.65;
    margin-bottom: 18px;
    letter-spacing: 0.2px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .card-tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 2px 6px;
    background: var(--deep);
    border-radius: 1px;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .card-model {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .copy-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--card-accent);
    background: transparent;
    border: 1px solid var(--card-accent);
    padding: 4px 10px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
    border-radius: 1px;
  }

  .copy-btn:hover {
    opacity: 1;
    background: var(--card-accent);
    color: var(--black);
  }

  .copy-btn.copied {
    opacity: 1;
    background: var(--card-accent);
    color: var(--black);
  }

  /* Featured card */
  .card.featured {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--surface) 0%, var(--deep) 100%);
  }

  .card.featured .card-prompt {
    font-size: 16px;
    columns: 2;
    gap: 30px;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--accent-a);
    color: var(--black);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1000;
    border-radius: 1px;
  }

  .tooltip.show { opacity: 1; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 40px;
    padding: 16px 60px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent-a);
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card.hidden { display: none; }

  /* Site Nav Link Elements */
  .nav-back-link {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
    margin-bottom: 20px;
  }
  .nav-back-link:hover {
    color: var(--accent-a);
  }
  .header-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  @media (max-width: 900px) {
    header { padding: 40px 24px 30px; }
    .grid { padding: 24px; grid-template-columns: 1fr; }
    .filters { padding: 16px 24px; }
    .stats-bar { padding: 14px 24px; gap: 24px; }
    .card.featured { grid-column: span 1; }
    .card.featured .card-prompt { columns: 1; }
    .logo { font-size: 48px; }
  }
  .donation-dock {
    position: fixed;
    bottom: 30px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
  }
  .buy-coffee-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent-a);
    color: var(--black);
    padding: 12px 24px;
    border-radius: 50px;
    font-family: 'DM Mono', monospace;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(200, 255, 71, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }
  .stripe-btn {
    background: #6772e5;
    box-shadow: 0 4px 15px rgba(103, 114, 229, 0.3);
    color: #fff;
  }
  .stripe-btn:hover {
    background: #5469d4;
    box-shadow: 0 6px 20px rgba(103, 114, 229, 0.5);
  }
  .buy-coffee-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(200, 255, 71, 0.5);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="/" class="nav-back-link">← Back to Main Site</a>
    <div class="logo">IDEA<span>ENGINE</span></div>
    <p style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:8px;">Creative Prompt Library v1.0</p>
  </div>
  <div class="header-meta">
    <p>Film · Story · Business</p>
    <p>Creative · Short Video · Long Video</p>
    <p style="margin-top:8px;color:var(--accent-a)">20 Prompts · 6 Categories</p>
  </div>
</header>

<div class="filters">
  <span class="filter-label">Filter ↗</span>
  <button class="tag-pill all active" onclick="filterCards('all', this)">All</button>
  <button class="tag-pill" onclick="filterCards('film', this)">Film Ideas</button>
  <button class="tag-pill" onclick="filterCards('story', this)">Story Ideas</button>
  <button class="tag-pill" onclick="filterCards('business', this)">Business Ideas</button>
  <button class="tag-pill" onclick="filterCards('creative', this)">Creative Approaches</button>
  <button class="tag-pill" onclick="filterCards('short', this)">Short Form Video</button>
  <button class="tag-pill" onclick="filterCards('long', this)">Long Form Video</button>
</div>

<div class="grid" id="grid"></div>

<div class="stats-bar">
  <div class="stat"><span class="stat-val">20</span><span class="stat-label">Prompts</span></div>
  <div class="stat"><span class="stat-val">6</span><span class="stat-label">Categories</span></div>
  <div class="stat"><span class="stat-val">3</span><span class="stat-label">Types</span></div>
  <div class="stat"><span class="stat-val" id="copied-count">0</span><span class="stat-label">Copied</span></div>
</div>

<div class="tooltip" id="tooltip">COPIED</div>

<script>
const prompts = [
  {
    "id": 1,
    "title": "The Ecstasy Gospel",
    "category": "film",
    "label": "FILM",
    "accent": "#d4820a",
    "prompt": "An angel falls onto a Liverpool housing estate in 1992 and quietly saves broken people while losing herself to rave culture.\n\nWrite a feature film about a supernatural being who arrives in working-class Northern England during the height of the rave era. She has no language for what she is. Explore how joy, community, and chemical euphoria mirror spiritual transcendence. Tone: Ken Loach meets Terrence Malick.",
    "tags": [
      "Feature",
      "Drama",
      "Supernatural",
      "90s"
    ],
    "model": "Feature"
  },
  {
    "id": 2,
    "title": "The Carrier",
    "category": "film",
    "label": "FILM",
    "accent": "#d4820a",
    "prompt": "A night-shift courier discovers every package he delivers contains a secret that changes the recipient's life.\n\nDevelop a no-budget short film set across one night in a post-industrial city. The protagonist is invisible \u2014 a delivery driver who witnesses transformation in others but never his own. Use architecture and fluorescent light as metaphor. Think Dardenne Brothers stripped to 12 minutes.",
    "tags": [
      "Short",
      "No-Budget",
      "Social Realism"
    ],
    "model": "Short"
  },
  {
    "id": 3,
    "title": "Signal / Noise",
    "category": "film",
    "label": "FILM",
    "accent": "#d4820a",
    "prompt": "A longitudinal documentary about young musicians navigating digital distribution, streaming economics, and identity loss.\n\nOutline a documentary film following three emerging UK artists across 18 months. Explore the tension between creative authenticity and platform optimisation. Integrate archival urban music footage with present-day interviews. Structure as three interwoven diaries. Access-led, observational style.",
    "tags": [
      "Documentary",
      "Music",
      "UK",
      "Longitudinal"
    ],
    "model": "Documentary"
  },
  {
    "id": 4,
    "title": "Archive Fever",
    "category": "film",
    "label": "FILM",
    "accent": "#d4820a",
    "prompt": "A museum curator begins to believe the 3D scans of historical objects contain trapped consciousness.\n\nWrite a hybrid narrative-documentary film exploring the ethics of digital preservation and cultural memory. Blend talking-head interviews with archivists and speculative fiction sequences. The protagonist is a digital fabrication artist working on a slavery memorial who starts hearing voices in the scan data.",
    "tags": [
      "Hybrid",
      "Archive",
      "Speculative",
      "3D"
    ],
    "model": "Hybrid"
  },
  {
    "id": 5,
    "title": "Estate Geometry",
    "category": "film",
    "label": "FILM",
    "accent": "#d4820a",
    "prompt": "A 360\u00b0 VR film placing the viewer inside a brutalist housing estate as it shifts between 1972, 1992 and 2024.\n\nDesign an immersive VR film experience for a heritage institution. The viewer inhabits the same physical space across three time periods. Sound design carries narrative continuity while visuals transform. Research methodology: oral histories, photogrammetric scans, archival footage composited into volumetric scenes.",
    "tags": [
      "VR",
      "360\u00b0",
      "Heritage",
      "Immersive"
    ],
    "model": "Immersive"
  },
  {
    "id": 6,
    "title": "Night School",
    "category": "film",
    "label": "FILM",
    "accent": "#d4820a",
    "prompt": "Six young people who have never met attend the same adult education class \u2014 and slowly reveal what brought them there.\n\nDevelop a micro-budget ensemble film set entirely within one classroom over six weeks. Each character represents a different route out of NEET status. Naturalistic dialogue, non-professional cast, available light. Inspired by Mike Leigh's improvisational development process. Strong on class, ambition, and failure.",
    "tags": [
      "Ensemble",
      "Micro-Budget",
      "NEET",
      "Social"
    ],
    "model": "Micro-Budget"
  },
  {
    "id": 1,
    "title": "Ghost Frequency",
    "category": "story",
    "label": "STORY",
    "accent": "#c0392b",
    "prompt": "A reclusive singer-songwriter discovers his unreleased recordings are being played on a pirate radio station by someone who shouldn't know they exist.\n\nWrite the opening chapter of a literary novel about a fragile male artist who has retreated from public life. He hears his own voice on the radio \u2014 songs he never released. The mystery pulls him back into the city and a past he buried. Tone: melancholy, precise, British indie fiction. Think Nick Hornby meets Patrick Keiller.",
    "tags": [
      "Novel",
      "Music",
      "Mystery",
      "British"
    ],
    "model": "Novel"
  },
  {
    "id": 2,
    "title": "The Guarantee",
    "category": "story",
    "label": "STORY",
    "accent": "#c0392b",
    "prompt": "A civil servant tasked with rolling out the UK Youth Guarantee programme discovers the system is actively fighting against the young people it claims to help.\n\nDevelop a 6-episode TV drama series following a DWP programme manager during the launch of a flagship youth employment scheme. Each episode follows one young NEET person. The bureaucracy is both antagonist and dark comedy. Tone: The Thick of It meets I, Daniel Blake. Contemporary, political, urgent.",
    "tags": [
      "TV Drama",
      "Series",
      "Political",
      "NEET"
    ],
    "model": "Script Series"
  },
  {
    "id": 3,
    "title": "The Scan",
    "category": "story",
    "label": "STORY",
    "accent": "#c0392b",
    "prompt": "A photogrammetry technician 3D scanning a decommissioned prison accidentally captures the memory of every person who ever passed through it.\n\nWrite a speculative fiction short story in which digital scanning technology becomes a vessel for collective trauma and memory. The protagonist is a creative technologist hired to produce a heritage model. Themes: incarceration, colonial legacy, the ethics of preservation. Approx. 4,000 words, first person, present tense.",
    "tags": [
      "Speculative",
      "Short Story",
      "Heritage",
      "3D"
    ],
    "model": "Speculative"
  },
  {
    "id": 4,
    "title": "Level Up",
    "category": "story",
    "label": "STORY",
    "accent": "#c0392b",
    "prompt": "A 17-year-old who has never left his estate discovers he has an extraordinary gift for game design \u2014 but the industry wants to own him.\n\nOutline a YA novel about a young person from a deprived Northern English background who becomes a viral game developer overnight. Explore class, creative ownership, mental health, and the ethics of the games industry. Include a neurodiverse protagonist. Positive in spirit but unflinching about structural barriers.",
    "tags": [
      "YA",
      "Games",
      "Class",
      "Neurodiversity"
    ],
    "model": "YA Novel"
  },
  {
    "id": 5,
    "title": "Frequency",
    "category": "story",
    "label": "STORY",
    "accent": "#c0392b",
    "prompt": "A BBC Radio 1 presenter in 1993 realises the pirate station she's been secretly listening to is broadcasting from the future.\n\nWrite a 6-part audio drama script for BBC Sounds. The protagonist is a female radio presenter navigating the tension between mainstream music industry and underground rave culture. The conceit: a pirate station transmitting prophetic signals. Rich use of music, sound design, and British vernacular. Approx. 25 minutes per episode.",
    "tags": [
      "Audio Drama",
      "Radio",
      "90s",
      "Sci-Fi"
    ],
    "model": "Audio Drama"
  },
  {
    "id": 6,
    "title": "Hands",
    "category": "story",
    "label": "STORY",
    "accent": "#c0392b",
    "prompt": "A visual narrative tracing the journey of a single pair of hands through 300 years of Atlantic history \u2014 enslaved, liberated, working, creating.\n\nDevelop a graphic novel concept using hands as the continuous visual motif across a multi-generational story of slavery, migration, and creative resistance. Each chapter covers a different era. No faces shown \u2014 only hands, objects, environments. Companion to a museum installation. Stark, political, luminous.",
    "tags": [
      "Graphic Novel",
      "History",
      "Memorial",
      "Visual"
    ],
    "model": "Graphic Novel"
  },
  {
    "id": 1,
    "title": "ScanForge Pro",
    "category": "business",
    "label": "BUSINESS",
    "accent": "#1a4a7a",
    "prompt": "A mobile-first 3D scanning and asset management platform for creative professionals and heritage institutions.\n\nWrite a business pitch for a B2B SaaS platform that makes photogrammetric 3D scanning accessible to non-technical creative professionals. Target markets: museums, film production, architecture, education. Core differentiator: AI-assisted clean-up and instant web/XR export. Include pricing tiers, go-to-market strategy, and Year 1 revenue model.",
    "tags": [
      "SaaS",
      "3D",
      "Heritage",
      "B2B"
    ],
    "model": "Platform"
  },
  {
    "id": 2,
    "title": "Pathway",
    "category": "business",
    "label": "BUSINESS",
    "accent": "#1a4a7a",
    "prompt": "A NEET-focused mobile app connecting young people aged 16\u201324 to employment, education, and creative opportunities with zero bureaucracy.\n\nDevelop a full product strategy for a UK government-endorsed app targeting NEET young people. The interface must be accessible, jargon-free, and built around earned trust rather than surveillance. Include gamification of skill progression, peer mentoring, and integration with DWP and Youth Guarantee trailblazers. Define KPIs and impact metrics.",
    "tags": [
      "App",
      "EdTech",
      "Gov",
      "Social Impact"
    ],
    "model": "App"
  },
  {
    "id": 3,
    "title": "Awork Creative Studio",
    "category": "business",
    "label": "BUSINESS",
    "accent": "#1a4a7a",
    "prompt": "A Liverpool-based creative technology studio specialising in immersive experiences, community engagement, and film production for cultural institutions.\n\nWrite a credentials deck and positioning strategy for a boutique creative studio combining film production, 3D fabrication, immersive arts, and community engagement. Target clients: Arts Council funded organisations, local authorities, heritage bodies, brands with social responsibility agendas. Unique selling point: integrated practice across physical and digital realms.",
    "tags": [
      "Agency",
      "Creative Tech",
      "Liverpool",
      "Culture"
    ],
    "model": "Agency"
  },
  {
    "id": 4,
    "title": "ImmersiveEDU",
    "category": "business",
    "label": "BUSINESS",
    "accent": "#1a4a7a",
    "prompt": "A curriculum-linked XR learning platform bringing VR and mixed reality into UK secondary schools with no hardware requirement.\n\nDesign a business model for a WebXR educational platform accessible via browser on any device. Focus on games design, creative technology, and digital arts curriculum. Teacher dashboard, student portfolio tracking, and AI-assisted lesson adaptation. Partnership model with schools, MATs, and awarding bodies. Pitch deck structure with financial projections.",
    "tags": [
      "XR",
      "EdTech",
      "Schools",
      "WebXR"
    ],
    "model": "EdTech"
  },
  {
    "id": 5,
    "title": "GRACE \u2014 The Franchise",
    "category": "business",
    "label": "BUSINESS",
    "accent": "#1a4a7a",
    "prompt": "A transmedia IP built around the GRACE story world: feature film, graphic novel, immersive experience, game, and soundtrack.\n\nDevelop a transmedia franchise strategy for an original IP set in 1990s Liverpool. Map the story world across: theatrical feature film, graphic novel prequel, VR experience for museum installation, mobile narrative game, and original vinyl soundtrack. Define rights structure, development phases, and funding pathways from BFI through to private equity.",
    "tags": [
      "IP",
      "Transmedia",
      "BFI",
      "Franchise"
    ],
    "model": "IP"
  },
  {
    "id": 6,
    "title": "Access by Design",
    "category": "business",

let copiedCount = 0;

function renderCards(filter = 'all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const filtered = filter === 'all' ? prompts : prompts.filter(p => p.category === filter);

  filtered.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = `card${p.featured ? ' featured' : ''}`;
    card.style.setProperty('--card-accent', p.accent);
    card.setAttribute('data-category', p.category);

    const num = String(p.id).padStart(2, '0');
    const tagsHtml = p.tags.map(t => `<span class="card-tag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="card-category">${p.label}</span>
        <span class="card-index">${num}</span>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-prompt">${p.prompt}</div>
      <div class="card-tags">${tagsHtml}</div>
      <div class="card-footer">
        <span class="card-model">${p.model}</span>
        <button class="copy-btn" onclick="copyPrompt(event, \`${p.prompt.replace(/`/g, '\\`')}\`, this)">Copy Prompt</button>
      </div>
    `;

    // Stagger animation
    card.style.opacity = '0';
    card.style.transform = 'translateY(12px)';
    grid.appendChild(card);

    setTimeout(() => {
      card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, i * 40);
  });
}

function filterCards(category, btn) {
  document.querySelectorAll('.tag-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(category);
}

function copyPrompt(e, text, btn) {
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'COPIED ✓';
    btn.classList.add('copied');
    copiedCount++;
    document.getElementById('copied-count').textContent = copiedCount;

    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 30) + 'px';
    tooltip.classList.add('show');

    setTimeout(() => {
      btn.textContent = 'Copy Prompt';
      btn.classList.remove('copied');
      tooltip.classList.remove('show');
    }, 1800);
  });
}

renderCards();
